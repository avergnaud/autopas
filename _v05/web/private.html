<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PAS Assistant — Application</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <span id="user-info"></span>
    <a href="/auth/logout" class="btn btn-small">Se déconnecter</a>
  </header>
  <main>
    <h1>PAS Assistant</h1>

    <div id="upload-section">
      <p>Sélectionnez votre questionnaire (.xlsx) pour commencer.</p>
      <input type="file" id="file-input" accept=".xlsx">
      <br><br>
      <button id="upload-btn" class="btn btn-primary" onclick="uploadFile()">Envoyer</button>
      <p id="error-msg" style="color:#c0392b; margin-top:1rem;"></p>
    </div>

    <div id="result-section" style="display:none;">
      <p id="result-msg"></p>
      <br>
      <a id="download-working-link" class="btn" href="#">Télécharger working.xlsx (copie brute)</a>
      <br><br>
      <button id="roundtrip-btn" class="btn btn-primary" onclick="doRoundtrip()">Tester le round-trip openpyxl</button>
      <p id="roundtrip-error" style="color:#c0392b; margin-top:1rem;"></p>
    </div>

    <div id="roundtrip-section" style="display:none;">
      <p>Round-trip terminé. Téléchargez et comparez avec working.xlsx.</p>
      <br>
      <a id="download-roundtrip-link" class="btn btn-primary" href="#">Télécharger roundtrip.xlsx</a>
    </div>
  </main>
  <script>
    async function checkAuth() {
      try {
        const res = await fetch('/api/auth/me');
        if (!res.ok) { window.location.href = '/'; return; }
        const user = await res.json();
        document.getElementById('user-info').textContent =
          `${user.name} (${user.email})`;
      } catch {
        window.location.href = '/';
      }
    }

    async function uploadFile() {
      const fileInput = document.getElementById('file-input');
      const errorMsg = document.getElementById('error-msg');
      const btn = document.getElementById('upload-btn');
      errorMsg.textContent = '';

      if (!fileInput.files.length) {
        errorMsg.textContent = 'Veuillez sélectionner un fichier.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Envoi en cours…';

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        if (!res.ok) {
          const err = await res.json();
          errorMsg.textContent = err.detail || "Erreur lors de l'envoi.";
          btn.disabled = false;
          btn.textContent = 'Envoyer';
          return;
        }
        const data = await res.json();
        window._projectId = data.project_id;
        document.getElementById('upload-section').style.display = 'none';
        document.getElementById('result-section').style.display = 'block';
        document.getElementById('result-msg').textContent =
          `Fichier « ${data.filename} » reçu. Projet : ${data.project_id}`;
        document.getElementById('download-working-link').href = data.download_url;
      } catch {
        errorMsg.textContent = 'Erreur réseau.';
        btn.disabled = false;
        btn.textContent = 'Envoyer';
      }
    }

    async function doRoundtrip() {
      const btn = document.getElementById('roundtrip-btn');
      const errorMsg = document.getElementById('roundtrip-error');
      errorMsg.textContent = '';
      btn.disabled = true;
      btn.textContent = 'Round-trip en cours…';

      try {
        const res = await fetch(`/api/projects/${window._projectId}/roundtrip`, { method: 'POST' });
        if (!res.ok) {
          const err = await res.json();
          errorMsg.textContent = err.detail || 'Erreur lors du round-trip.';
          btn.disabled = false;
          btn.textContent = 'Tester le round-trip openpyxl';
          return;
        }
        const data = await res.json();
        document.getElementById('roundtrip-section').style.display = 'block';
        document.getElementById('download-roundtrip-link').href = data.download_url;
        btn.style.display = 'none';
      } catch {
        errorMsg.textContent = 'Erreur réseau.';
        btn.disabled = false;
        btn.textContent = 'Tester le round-trip openpyxl';
      }
    }

    checkAuth();
  </script>
</body>
</html>
